<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <title>Login — Patrimônio Inteligente</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- CSS original do sistema (mantém variáveis e componentes) -->
  <link rel="stylesheet" href="../styles/global.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/login-new.css" />
  <link rel="stylesheet" href="../styles/responsive.css" />
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo e título -->
      <img src="../assets/logo.png" alt="Logo da Prefeitura de Oriximiná" class="login-logo" />
      <h1 class="login-title">Patrimônio Inteligente</h1>
      <p class="login-subtitle">Prefeitura Municipal de Oriximiná/PA</p>

      <h2 class="login-section-title">Acesso ao sistema</h2>

      <!-- Alertas -->
      <div id="alert-info" class="alert alert-info" role="status" aria-live="polite"></div>
      <div id="alert-error" class="alert alert-danger" role="alert" aria-live="assertive"></div>

      <!-- Formulário -->
      <div class="mb-3">
        <label class="form-label" for="email">
          E-mail institucional <span class="text-danger">*</span>
        </label>
        <input type="email" id="email" class="form-control" placeholder="usuario@oriximina.pa.gov.br"
          autocomplete="email" required />
      </div>

      <div class="mb-4">
        <label class="form-label" for="senha">
          Senha <span class="text-danger">*</span>
        </label>
        <input type="password" id="senha" class="form-control" placeholder="••••••••" autocomplete="current-password"
          required />
      </div>

      <button id="btn-login" class="btn btn-primary btn-entrar w-100" type="button">
        Entrar
      </button>

    </div>

    <p class="login-footer">
      Desenvolvido pela Secretaria de Municipal de Eficiência Governamental &mdash; SEMEG<br />
    </p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../scripts/pages/login.js"></script>

</body>

</html>
